<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM SENA - Acceso Admin</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:( #0F1A24);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-page {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .logo-header {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
        }
        
        .logo-header img {
            width: 60px;
            height: auto;
        }
        
        .login-content {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        
        .login-content h1 {
            color: #ffffff;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 40px;
            line-height: 1.4;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            color: #ffffff;
            font-weight: 500;
            margin-bottom: 12px;
            font-size: 15px;
            text-align: left;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(145, 173, 201, 0.2);
            border-radius: 8px;
            font-size: 15px;
            background: #243647;
            color: #FFFFFF;
            transition: all 0.3s ease;
        }
        
        .form-group input::placeholder {
            color: #91ADC9;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #1273D4;
            background: rgba(36, 54, 71, 0.8);
            box-shadow: 0 0 0 3px rgba(18, 115, 212, 0.15);
        }
        
        .login-button {
            width: 100%;
            padding: 14px;
            background: #1273D4;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(18, 115, 212, 0.5);
        }
        
        .login-button:active {
            transform: translateY(0);
        }
        
        .login-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .error-message {
            background: rgba(211, 47, 47, 0.1);
            border: 1px solid #D32F2F;
            color: #FF6B6B;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #D32F2F;
        }
        
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #FFFFFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: #91ADC9;
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .login-content h1 {
                font-size: 24px;
                margin-bottom: 30px;
            }
            
            .logo-header {
                top: 20px;
                left: 20px;
            }
            
            .logo-header img {
                width: 50px;
            }
            
            .footer {
                bottom: 20px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="logo-header">
        <img src="assets/images/logo.png" alt="GYM SENA Logo">
    </div>
    
    <div class="login-page">
        <div class="login-content">
            <h1>Iniciar sesión en Panel de Administrador</h1>
            
            <div class="error-message" id="errorMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo electrónico o usuario</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                    >
                </div>
                
                <button type="submit" class="login-button" id="submitButton">
                    <span class="text">Iniciar sesión</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>
    </div>
    
    <div class="footer">
        © 2026 GYM SENA. Todos los derechos reservados.
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitButton = document.getElementById('submitButton');
            const errorMessage = document.getElementById('errorMessage');
            
            // Mostrar spinner
            submitButton.querySelector('.text').style.display = 'none';
            submitButton.querySelector('.spinner').style.display = 'block';
            submitButton.disabled = true;
            
            try {
                const result = await adminLogin(email, password);
                
                if (result.success) {
                    // Guardar token y redirigir
                    localStorage.setItem('adminToken', result.token);
                    localStorage.setItem('adminUser', JSON.stringify(result.user));
                    window.location.href = 'dashboard.html';
                } else {
                    errorMessage.textContent = result.message || 'Error en la autenticación';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Error: ' + error.message;
                errorMessage.style.display = 'block';
            } finally {
                // Ocultar spinner
                submitButton.querySelector('.text').style.display = 'inline';
                submitButton.querySelector('.spinner').style.display = 'none';
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
