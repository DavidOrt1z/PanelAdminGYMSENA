<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM SENA - Acceso Admin</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="logo-header">
        <img src="assets/images/logo.png" alt="GYM SENA Logo">
    </div>
    
    <div class="login-page">
        <div class="login-content">
            <h1>Iniciar sesión en Panel de Administrador</h1>
            
            <div class="error-message" id="errorMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo electrónico o usuario</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-field">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required
                        >
                        <button type="button" id="togglePasswordBtn" class="password-toggle" aria-label="Mostrar contraseña" aria-pressed="false">
                            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="m3 3 18 18"></path>
                                <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58"></path>
                                <path d="M9.88 5.09A9.77 9.77 0 0 1 12 4c7 0 11 8 11 8a18.68 18.68 0 0 1-4.24 5.09"></path>
                                <path d="M6.61 6.61A18.55 18.55 0 0 0 1 12s4 8 11 8a9.77 9.77 0 0 0 5.39-1.61"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="login-button" id="submitButton">
                    <span class="text">Iniciar sesión</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>
    </div>
    
    <div class="footer">
        © 2026 GYM SENA. Todos los derechos reservados.
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/loginPage.js"></script>
</body>
</html>
